spring:
  application:
    name: campus-lost-found-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:+
  port: ${PORT:8080}

app:
  upload-dir: ${UPLOAD_DIR:uploads}
  cors-origins: ${CORS_ORIGINS:http://localhost:5173}
